<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>니콘 중고 시세 트래커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">니콘 중고 시세 트래커</h1>
      <p class="site-subtitle">eBay 현재 매물 기준 시세 (배송비 포함 USD)</p>
      <p class="site-updated" id="updated-date"></p>
    </div>
  </header>

  <nav class="category-nav">
    <div class="container">
      <ul class="category-tabs" id="category-tabs"></ul>
    </div>
  </nav>

  <main class="container">
    <div id="product-grid" class="product-grid"></div>
    <div id="loading" class="loading">데이터를 불러오는 중...</div>
    <div id="error" class="error-message" hidden>데이터를 불러올 수 없습니다.</div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-attribution">
        <img src="assets/ebay-logo.svg" alt="eBay" class="ebay-logo">
        <span>Powered by eBay Browse API</span>
      </div>
      <p class="footer-note">가격은 현재 eBay 매물 기준이며, 실제 거래가와 다를 수 있습니다.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
