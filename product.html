<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제품 상세 - 니콘 중고 시세 트래커</title>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-823D75RRWJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-823D75RRWJ');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="back-link">&larr; 전체 목록</a>
      <h1 class="product-title" id="product-title"></h1>
      <p class="product-subtitle" id="product-subtitle"></p>
    </div>
  </header>

  <main class="container">
    <div id="loading" class="loading">데이터를 불러오는 중...</div>
    <div id="error" class="error-message" hidden>데이터를 불러올 수 없습니다.</div>

    <div id="product-content" hidden>
      <!-- 가격 요약 -->
      <div class="price-summary">
        <div class="price-card price-card--primary">
          <span class="price-label">중앙값</span>
          <span class="price-value" id="price-median"></span>
        </div>
        <div class="price-card">
          <span class="price-label">평균</span>
          <span class="price-value" id="price-mean"></span>
        </div>
        <div class="price-card">
          <span class="price-label">최저</span>
          <span class="price-value" id="price-min"></span>
        </div>
        <div class="price-card">
          <span class="price-label">최고</span>
          <span class="price-value" id="price-max"></span>
        </div>
        <div class="price-card">
          <span class="price-label">매물 수</span>
          <span class="price-value" id="price-count"></span>
        </div>
        <div class="price-card">
          <span class="price-label">Q1 - Q3</span>
          <span class="price-value price-value--small" id="price-iqr"></span>
        </div>
      </div>

      <!-- 시세 차트 -->
      <section class="chart-section">
        <div class="chart-header">
          <h2>시세 추이</h2>
          <div class="period-selector">
            <button class="period-btn" data-period="30">1개월</button>
            <button class="period-btn" data-period="90">3개월</button>
            <button class="period-btn active" data-period="180">6개월</button>
            <button class="period-btn" data-period="365">1년</button>
            <button class="period-btn" data-period="0">전체</button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="price-chart"></canvas>
          <p class="chart-empty" id="chart-empty" hidden>아직 시계열 데이터가 없습니다. 데이터가 축적되면 차트가 표시됩니다.</p>
        </div>
      </section>

      <!-- 현재 매물 -->
      <section class="listings-section">
        <h2>현재 매물 예시</h2>
        <div class="listings-grid" id="listings-grid"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-attribution">
        <img src="assets/ebay-logo.svg" alt="eBay" class="ebay-logo">
        <span>Powered by eBay Browse API</span>
      </div>
      <p class="footer-note">가격은 현재 eBay 매물 기준이며, 실제 거래가와 다를 수 있습니다.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
